name: Staging PR Infra

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-2

    steps:
      # ✅ Checkout code
      - name: Checkout repo
        uses: actions/checkout@v3

      # ✅ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ✅ Configure AWS credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ Generate dynamic staging tf file
      - name: Create staging resource file
        id: generate
        run: |
          OUTPUT=$(./create_staging_resource.sh)
          echo "$OUTPUT"

          RESOURCE_FILE=$(echo $OUTPUT | jq -r '.resource_file')
          TF_OUTPUT=$(echo $OUTPUT | jq -r '.terraform_expected_output')

          RESOURCE_ID=$(echo $RESOURCE_FILE | sed 's/extra_staging_//;s/.tf//')

          echo "RESOURCE_FILE=$RESOURCE_FILE" >> $GITHUB_ENV
          echo "TF_OUTPUT=$TF_OUTPUT" >> $GITHUB_ENV
          echo "RESOURCE_ID=$RESOURCE_ID" >> $GITHUB_ENV

      # ✅ Terraform Init (you can later make backend key dynamic here)
      - name: Terraform Init
        run: |
          terraform init

      # ✅ Terraform Plan (capture logs)
      - name: Terraform Plan
        id: plan
        continue-on-error: true
        run: |
          terraform plan \
            -var="staging_pr_public_key=${{ secrets.PUBLIC_KEY }}" \
            -var="base_ami_id=${{ secrets.AMI_ID }}" \
            -out=tfplan 2>&1 | tee terraform.log

      # 🔥 Handle stale lock automatically
      - name: Force Unlock if Needed
        if: steps.plan.outcome == 'failure'
        run: |
          echo "Terraform failed. Checking for lock..."

          LOCK_ID=$(grep -A 10 "Lock Info:" terraform.log | grep "ID:" | awk '{print $2}')

          if [ -z "$LOCK_ID" ]; then
            echo "No lock ID found. Failing..."
            exit 1
          fi

          echo "Force unlocking state: $LOCK_ID"
          terraform force-unlock -force $LOCK_ID

      # 🔁 Retry Plan after unlock
      - name: Retry Terraform Plan
        if: steps.plan.outcome == 'failure'
        run: |
          terraform plan \
            -var="staging_pr_public_key=${{ secrets.PUBLIC_KEY }}" \
            -var="base_ami_id=${{ secrets.AMI_ID }}" \
            -out=tfplan

      # ✅ Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      # ✅ Extract output
      - name: Get Output
        id: output
        run: |
          DNS=$(terraform output -raw staging_pr_dns || true)
          echo "DNS=$DNS" >> $GITHUB_ENV

      # ✅ Comment on PR
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const dns = process.env.DNS || "Not available";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Staging environment ready:\n\n🌐 ${dns}`
            })